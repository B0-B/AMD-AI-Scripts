  # ~ 128 Tokens
  - |
    This is prompt one. To reach 128 tokens, you need about one hundred words of text. 
    You can fill this area with your specific instructions, context, or technical 
    documentation. vLLM will process this entire block as a single input sequence. 
    Make sure to use the pipe symbol if you have multiple paragraphs or code snippets 
    within a single list item. This ensures all spacing and newlines are preserved 
    exactly as written, which is crucial for maintaining the structure of your 
    data when the server parses it for benchmarking.
  - |
    This is prompt two. It follows the same rule of being a long-form text block.
    If you are using the "random" dataset feature in vLLM, it generates these tokens
    automatically. However, by putting them in this YAML list, you are creating a
    "fixed" dataset where the content remains identical across multiple test runs.
    This is much better for comparing the latency of different GPU configurations 
    or quantization methods, as the input remains a constant variable while you
    tweak your server settings to find the highest possible throughput.
  - |
    This is prompt three. When creating these, remember that special characters like 
    emojis, complex punctuation, and long technical terms often count as multiple 
    tokens. If your goal is a strict stress test, try to include a variety of 
    characters. A simple paragraph of 100 words is usually enough to hit the 
    128-token mark. Keep an eye on your tokenizer's specific behavior, as a Llama 
    tokenizer might count this text differently than a GPT or Mistral tokenizer 
    would, though the difference is usually minor for standard English prose.
  - |
    Explain the evolution of large language models from early recurrent neural networks to the 
    modern transformer architecture used in GPT-4 and Llama 3. Focus on how the self-attention 
    mechanism allowed for better parallelization during training and how this led to the massive 
    scaling we see today. Describe why the industry moved away from LSTM and GRU models in 
    favor of the encoder-decoder and decoder-only designs that currently dominate the field 
    of natural intelligence and machine learning research worldwide for high-performance apps.
  - |
    Write a comprehensive guide on how to optimize a high-traffic web application using a 
    combination of edge computing and localized database caching strategies. Your response 
    should include specific examples of using Redis for session management and how to 
    implement a Content Delivery Network like Cloudflare to reduce latency for global users. 
    Explain the trade-offs between strong consistency and eventual consistency in a 
    distributed system and provide a sample architecture diagram description that ensures 
    high availability and disaster recovery across multiple regions easily.
  - |
    Describe the process of brewing a professional-grade espresso at home, starting from the 
    selection of high-altitude Arabica beans to the final extraction process. Detail the 
    importance of grind size consistency using a high-quality burr grinder and how water 
    temperature affects the acidity and body of the shot. Explain the chemistry of milk 
